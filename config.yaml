search:
  providers:
    - flatfox
    - homegate
    - comparis

  comparis:
    base_url: "https://www.comparis.ch/immobilien/result/list"
    params:
      sort: 11
    # Comparis uses a JSON object in the 'requestobject' query param
    request_object:
      DealType: 10
      SiteId: 0
      RootPropertyTypes: []
      PropertyTypes: []
      RoomsFrom: "3"
      PriceTo: "3600"
      Radius: "6"
      LocationSearchString: "8004"
      Sort: 11
      SwapProperty: 1
      MinAvailableDate: "1753-01-01T00:00:00"
    request_timeout_seconds: 30
    detail_request_delay_seconds: 2.0
    use_playwright_fallback: true
    playwright:
      enabled: true
      headless: false
      wait_after_load_seconds: 15
      challenge_wait_seconds: 45
      manual_continue: true
      dump_html_path: "output/raw_search_playwright_comparis.html"
      cookies_file: "cookies_comparis.txt"

  flatfox:
    # Zurich Search parameters
    base_url: "https://flatfox.ch/it/search/"
    params:
      query: "Europaallee"
      place_name: "Europaallee, 8004 Zurich, Switzerland"
      north: 47.42
      south: 47.32
      east: 8.63
      west: 8.45
      min_rooms: 3
      is_furnished: "true"
      is_swap: "false"
      ordering: "price_display"
      take: 1000
      max_price: 3600
    request_timeout_seconds: 30
    detail_request_delay_seconds: 1.0 # Be gentle to avoid blocks
    use_playwright_fallback: true
    playwright:
      enabled: true
      headless: false # Set to true for production, false to debug challenges
      wait_after_load_seconds: 12
      challenge_wait_seconds: 30
      manual_continue: true
      dump_html_path: "output/raw_search_playwright_flatfox.html"

  homegate:
    base_url: "https://www.homegate.ch/rent/real-estate/city-zurich/matching-list"
    params:
      ac: 3 # min rooms
      ah: 3600 # max price
      o: "resultingSearchablePrice-desc" # Order by price desc
    # Optional: add browser-like headers/cookies if anti-bot blocks direct requests
    # request_headers:
    #   Accept-Language: "en-US,en;q=0.9"
    # cookies:
    #   datadome: "..."
    #   cf_clearance: "..."
    request_timeout_seconds: 30
    detail_request_delay_seconds: 1.5
    use_playwright_fallback: true
    playwright:
      enabled: true
      headless: false
      wait_after_load_seconds: 15
      challenge_wait_seconds: 40
      manual_continue: true
      dump_html_path: "output/raw_search_playwright_homegate.html"
      cookies_file: "cookies_homegate.txt"

  output_dir: "output"

llm:
  # Hugging Face Inference API (Serverless)
  token: "" 
  # DeepSeek-R1 Distill (Thinking Model) - Choosing a size likely to be on serverless
  model_id: "deepseek-ai/DeepSeek-R1-Distill-Qwen-32B"

criteria:
  center:
    label: "Europaallee, 8004 Zurich"
  max_price: 3600
  min_bedrooms: 2
  must_be_furnished: true
  must_have_private_entire_place: true # No shared/WG
  must_be_indefinite: true # Exclude sublets/temporary
  must_have_kitchen: true
  must_have_bathroom: true
  must_have_living_room: true
  must_have_sofa: true
  available_on_or_before: "2026-06-15"
  include_unknowns_to_avoid_false_negatives: true # Safer for fuzzy matching
  optional_features:
    - washing_machine
    - dishwasher

contact:
  message_template_path: "message_template.txt"
